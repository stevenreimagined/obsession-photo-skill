# Obsession 摄影插件 · 社团配置
# 按你们社团的情况改这里，脚本会自动读取这些默认值（命令行参数仍可临时覆盖）。
# 这个文件是可选的——删了也能跑，只是回到内置默认值。

club:
  prefix: OAO              # 文件名前缀（组织/社团缩写），用于统一命名
  default_camera: FX30     # 默认机型（参数推荐时用）
  region: 50               # 市电频率 50 或 60（中国/欧洲=50，北美/日本东部=60），防频闪用
  watermark_text: "WFLA 摄影社"   # 文字水印（若以后做批量交付/报告署名）

# 选片初筛 cull.py 的阈值（在你们的真实照片上跑顺手后可微调固化）
cull:
  blur: 90                 # 虚焦阈值（分块清晰度第90百分位，越小越糊）
  sharp_full: 700          # 清晰满分参考
  keep_above: 60           # “推荐保留”分数线
  cull_below: 38           # “建议淘汰”分数线
  burst: 8                 # 连拍相似度（汉明距离≤即同组）

# 快速初检 triage.py 的阈值
triage:
  blur: 70
  over: 15                 # 高光大面积溢出占比阈值(%)
  burst: 8
  burst_min: 4             # 多少张以上才提示“连拍重复过多”
  minvid: 2.0              # 视频最短秒数

# 睁/闭眼判定
eyes:
  ear_thresh: 0.15         # EAR 低于此值判为闭眼
